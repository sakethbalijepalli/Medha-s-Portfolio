<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Apply saved theme before first paint to avoid a flash of the wrong theme -->
  <script>
    (function () {
      try {
        if (localStorage.getItem('theme') === 'dark') {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    })();
  </script>

  <title>Medha Srigiri — Kuchipudi Artist</title>
  <meta name="description" content="Medha Srigiri is a classical Kuchipudi dancer dedicated to preserving and sharing the beauty of South Indian classical dance through authentic performance and choreography.">
  <link rel="canonical" href="https://medhasrigiri.com/">

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" sizes="16x16 32x32 48x48">
  <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="/favicon-512.png" type="image/png" sizes="512x512">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <!-- Open Graph (WhatsApp, iMessage, Telegram, Facebook, LinkedIn) -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://medhasrigiri.com/">
  <meta property="og:title"       content="Medha Srigiri — Kuchipudi Artist">
  <meta property="og:description" content="Classical Kuchipudi dancer dedicated to preserving and sharing the beauty of South Indian classical dance.">
  <meta property="og:image"       content="https://medhasrigiri.com/images/Home_page_photo.JPG">
  <meta property="og:image:alt"   content="Medha Srigiri — Kuchipudi dance performance">
  <meta property="og:image:width" content="1920">
  <meta property="og:image:height" content="1280">

  <!-- Twitter / X card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Medha Srigiri — Kuchipudi Artist">
  <meta name="twitter:description" content="Classical Kuchipudi dancer dedicated to preserving and sharing the beauty of South Indian classical dance.">
  <meta name="twitter:image"       content="https://medhasrigiri.com/images/Home_page_photo.JPG">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Google reCAPTCHA v2 — site key is public; secret key lives in EmailJS template settings -->
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-white dark:bg-gray-950 transition-colors duration-500">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
